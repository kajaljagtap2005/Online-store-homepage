<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeStore | Premium Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="toast" class="fixed top-6 right-6 z-[100] flex items-center gap-3 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl translate-x-[150%] transition-transform duration-500">
        <div class="bg-indigo-500 rounded-full p-1"><i class="fas fa-check text-xs"></i></div>
        <span id="toastMsg">Action Successful!</span>
    </div>

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 py-4 flex justify-between items-center">
        <h1 class="text-3xl font-black text-indigo-600 tracking-tighter uppercase">LuxeStore<span class="text-slate-900">.</span></h1>
        
        <div class="hidden md:flex flex-1 max-w-md mx-10">
            <div class="relative w-full">
                <i class="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="Search products..." class="w-full pl-12 pr-4 py-3 rounded-xl bg-slate-100 focus:ring-2 focus:ring-indigo-400 outline-none transition-all border-none">
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="relative cursor-pointer group">
                <i class="fas fa-heart text-2xl text-slate-400 group-hover:text-rose-500 transition"></i>
                <span id="wishlistCount" class="absolute -top-2 -right-2 bg-rose-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
            </div>
            <button class="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all active:scale-95">
                <i class="fas fa-shopping-cart mr-2"></i> Cart
            </button>
        </div>
    </nav>
